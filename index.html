<!doctype html>
<html>

<head>
    <title>Небосвинська пісочниця</title>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="60">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"
          type="image/png"
          sizes="64x64"
          href="https://liskyveaber.github.io/bsky-tools-unfollowers/icon/favicon.png">
    <style>
        body {
            background-color: black;
        }

        #content-container {
            display: block;
        }

        #home-link {
            border: 1px solid white;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            display: block;
            font: 36px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 24px;
            text-decoration: none;
        }

        #home-link:hover {
            background-color: rgb(38, 39, 45);
        }

        .nav-container {
            padding: 24px;
            text-align: center;
        }
    </style>
</head>

<body>
    <nav>
        <div class="nav-container">
            <a id="home-link" href="https://liskyveaber.github.io/bsky-tools">Небосвинська пісочниця</a>
        </div>
    </nav>

    <div>
        <a href="#" onclick="loadUnfollowersPage()">Unfollowers</a>
    </div>

    <div id="content-container"></div>

    <script src="https://liskyveaber.github.io/bsky-tools-unfollowers/script.js"></script>
    <script>
        function loadUnfollowersPage() {
            fetch('https://liskyveaber.github.io/bsky-tools-unfollowers/', {
                method: 'GET',
                headers: {
                    'Accept': 'text/html'
                }
            })
                .then(response => response.text())
                .then(html => {
                    document.getElementById('content-container').innerHTML = html;
                })
                .catch(error => console.error('Error loading content:', error));
        }
    </script>
</body>

</html>
