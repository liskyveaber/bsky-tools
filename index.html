<!doctype html>
<html>

<head>
    <title>Небосвинська пісочниця</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="64x64"
        href="https://liskyveaber.github.io/bsky-tools-unfollowers/icon/favicon.png">
    <style>
        body {
            background-color: black;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        footer {
            color: white;
            border: 1px solid white;
            border-radius: 20px;
            display: block;
            margin: 24px;
            padding: 16px;
            text-align: center;
        }

        footer>a {
            color: white;
        }

        footer>a:hover {
            color: rgb(0, 133, 255);
        }

        #content-container {
            display: block;
            padding-bottom: 24px;
            padding-left: 24px;
            padding-right: 24px;
        }

        #grid-container {
            padding: 24px;
        }

        #home-link {
            border: 1px solid white;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            display: block;
            font-size: 34px;
            font-weight: 500;
            letter-spacing: 0.25px;
            padding-bottom: 24px;
            padding-top: 24px;
            text-decoration: none;
            width: 100%;
        }

        #home-link:hover {
            background-color: rgb(38, 39, 45);
        }

        .card {
            border: 1px solid white;
            border-radius: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            padding-bottom: 16px;
            padding-left: 36px;
            padding-right: 36px;
            padding-top: 16px;
            min-height: 150px;
            text-wrap: pretty;
            width: 30%;
        }

        .card:hover {
            background-color: rgb(38, 39, 45);
            cursor: pointer;
        }

        .nav-container {
            padding: 24px;
            text-align: center;
        }
    </style>
</head>

<body>
    <nav>
        <div class="nav-container">
            <a id="home-link" href="https://liskyveaber.github.io/bsky-tools">Небосвинська пісочниця</a>
        </div>
    </nav>

    <div id="grid-container">
        <div class="card" onclick="loadUnfollowersPage()">
            <h3>Знайти невзаємні підписки</h3>
            <p>Шукати користувачів, яких ви читаєте, але які не читають вас навзаєм</p>
        </div>
    </div>
    <div id="content-container"></div>

    <footer>
        Розроблено <a href="https://bsky.app/profile/liskyveaber.bsky.social"
            target="_blank">@liskyveaber.bsky.social</a>. Всі права не захищено
        <br>
        Версія 2.0.0
    </footer>

    <script src="https://liskyveaber.github.io/bsky-tools-unfollowers/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (localStorage.getItem('reloadTime')) {
                const reloadTimestamp = localStorage.getItem('reloadTime');
                const reloadTime = new Date(reloadTimestamp);
                const now = new Date();
                const timeDifference = now - reloadTime;
                // const isGreaterThan24Hours = timeDifference > 24 * 60 * 60 * 1000;
                const isGreaterThan24Hours = timeDifference > 10 * 1000;

                if (isGreaterThan24Hours) {
                    console.log('1');
                    localStorage.setItem('reloadTime', now.getTime());
                    location.reload(true);
                }

                console.log('2');
            } else {
                console.log('2');
                localStorage.setItem('reloadTime', new Date().getTime());
            }
        });

        function loadUnfollowersPage() {
            fetch('https://liskyveaber.github.io/bsky-tools-unfollowers/', {
                method: 'GET',
                headers: {
                    'Accept': 'text/html'
                }
            })
                .then(response => response.text())
                .then(html => {
                    document.getElementById('grid-container').style.display = 'none';
                    document.getElementById('content-container').innerHTML = html;

                    if (localStorage.getItem('handle') && document.getElementById('handle')) {
                        document.getElementById('handle').value = localStorage.getItem('handle');
                    }

                    if (localStorage.getItem('appPassword') && document.getElementById('appPassword')) {
                        document.getElementById('appPassword').value = localStorage.getItem('appPassword');
                    }
                })
                .catch(error => console.error('Error loading content:', error));
        }
    </script>
</body>

</html>
